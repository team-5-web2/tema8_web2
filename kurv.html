<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="Css/index.css"
    />
    <link
      rel="stylesheet"
      href="Css/kurv.css"
    />
    <link
      rel="stylesheet"
      href="Css/custom.css"
    />
    <title>HAUBJERG produkt</title>
  </head>
  <body>
    <header>
      <div class="logo">HAUBJERG Home</div>
      <nav class="menu">
        <a href="">Alle kategorier</a>
        <a href="kategori.html">Indretning</a>
        <a href="kategori.html">Møbler</a>
        <a href="kategori.html">Køkkenudstyr</a>
        <a href="form.html">Bliv medlem</a>
      </nav>
      <button class="kurv">Kurv</button>
    </header>
    <main>
      <div class="intro">
        <h2>Din indkøbskurv:</h2>
        <p>Produkter:</p>
      </div>
      <section class="cart">
        <div class="buyproductimg">
          <img
            src="img/image 38.png"
            alt=""
          />
        </div>
        <div class="productinfo">
          <p>Produktnavn:</p>

          <div class="quantity">
            <p>Antal:</p>
            <button>-</button>
            <span>1</span>
            <button>+</button>
          </div>
          <div class="price">
            <p>Pris:</p>
            <p class="pricen"><span>2499.99</span>,- DKK</p>
          </div>
        </div>
      </section>
      <div class="total">
        <p>I alt: <span>1234,56</span></p>
        <br />
        <button class="checkout">Gå til betaling</button>
      </div>
    </main>
    <footer>
      <div class="flex_1-1">
        <div class="footer">
          <img
            src="img/image 52.png"
            alt=""
          />
        </div>
        <div class="Kontakt">
          <p>Kontakt</p>
          <p>Tlf: 12345678</p>
          <p>Mail: 1234@1234</p>
          <p>Adresse: Guldbergsgade 29N</p>
        </div>
      </div>
    </footer>
    <script src="Javascript/produkt.js"></script>
  </body>
</html>
